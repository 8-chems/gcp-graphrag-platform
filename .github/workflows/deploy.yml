name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  ENVIRONMENT: dev
  REPO: graphrag-platform-dev-images

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint backend
        working-directory: backend
        run: python -m py_compile $(find app -name "*.py")

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA_EMAIL }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build & push backend image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/backend:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "BACKEND_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Build & push frontend image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:${{ github.sha }}"
          docker build -t "$IMAGE" \
            --build-arg VITE_API_URL=${{ secrets.BACKEND_URL }} \
            ./frontend
          docker push "$IMAGE"
          echo "FRONTEND_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=${{ env.REGION }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -var="container_image_backend=${{ env.BACKEND_IMAGE }}" \
            -var="container_image_frontend=${{ env.FRONTEND_IMAGE }}" \
            -var="neo4j_uri=${{ secrets.NEO4J_URI }}" \
            -var="neo4j_user=${{ secrets.NEO4J_USER }}" \
            -var="neo4j_password=${{ secrets.NEO4J_PASSWORD }}" \
            -var="github_repo=${{ github.repository }}" \
            -var="admin_emails=${{ secrets.ADMIN_EMAILS }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Run smoke test
        run: |
          BACKEND_URL=$(cd terraform && terraform output -raw backend_url)
          curl --fail "$BACKEND_URL/api/v1/health" || exit 1
