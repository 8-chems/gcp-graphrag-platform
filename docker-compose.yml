version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: development
      PROJECT_ID: ${GCP_PROJECT_ID:-your-gcp-project}
      REGION: ${GCP_REGION:-europe-west1}
      SQL_HOST: postgres
      SQL_PORT: 5432
      SQL_DB: app_db
      SQL_USER: app_user
      SQL_PASSWORD: local_dev_password
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: local_dev_password
      GCS_BUCKET: ${GCS_BUCKET:-your-project-documents}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./backend/app:/app/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "5173:8080"
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: local_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/local_dev_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  neo4j_data:
